<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cram - Главная</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            background: var(--bg);
        }

        .splash-logo {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .splash-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .splash-subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .splash-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn-primary-full {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-outline-full {
            width: 100%;
            padding: 16px;
            background: var(--surface);
            color: var(--text);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="splash">
        <div class="splash-logo">📚</div>
        <h1 class="splash-title">Cram</h1>
        <p class="splash-subtitle">Учись эффективнее</p>

        <div class="splash-buttons">
            <a href="login.html" class="btn-primary-full">Войти</a>
            <a href="register.html" class="btn-outline-full">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        // Если уже авторизован - сразу на дашборд
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
