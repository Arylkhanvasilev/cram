<div class="ai-layout">
    <!-- Маленький островок (когда боковая панель скрыта) -->
    <div class="ai-island" id="aiIsland">
        <button class="ai-island-btn" onclick="toggleSidebar()" title="Развернуть историю">☰</button>
        <button class="ai-island-btn ai-island-btn--primary" onclick="newConversation()" title="Новый диалог">+</button>
    </div>

    <!-- Боковая панель с историей -->
    <div class="ai-sidebar" id="aiSidebar">
        <div class="ai-sidebar-header">
            <button class="ai-sidebar-toggle" onclick="toggleSidebar()" title="Свернуть">✕</button>
            <h3>Диалоги</h3>
        </div>
        <div class="ai-conversations" id="conversationsList">
            <p style="color: var(--color-text-muted); font-size: 13px; padding: 12px;">Загрузка...</p>
        </div>
        <!-- Кнопка нового диалога снизу -->
        <div class="ai-sidebar-footer">
            <button class="ai-new-chat-btn" onclick="newConversation()">
                <span>+</span>
                <span>Новый диалог</span>
            </button>
        </div>
    </div>

    <!-- Основная область чата -->
    <div class="ai-main">
        <!-- Пустое состояние -->
        <div id="chatEmpty" class="ai-empty">
            <div class="ai-empty-icon">🤖</div>
            <h3>AI-помощник Cram</h3>
            <p>Выбери диалог слева или начни новый</p>
            <button class="btn btn-primary" onclick="newConversation()">Начать диалог</button>
        </div>

        <!-- Активный чат -->
        <div id="chatActive" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-active-header">
                <span id="convTitle">Новый диалог</span>
            </div>
            <div class="ai-chat-messages" id="chatMessages"></div>
            <div class="ai-chat-input-row">
                <div class="ai-chat-input-wrapper">
                    <textarea id="chatInput" rows="2" placeholder="Задай вопрос AI-помощнику..."
                        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                    <button onclick="sendMessage()" title="Отправить">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentConversationId = null;

    // ===== БОКОВАЯ ПАНЕЛЬ =====

    function toggleSidebar() {
        const sidebar = document.getElementById('aiSidebar');
        const island = document.getElementById('aiIsland');

        console.log('toggleSidebar called'); // ← добавь для проверки

        sidebar.classList.toggle('ai-sidebar--collapsed');

        if (sidebar.classList.contains('ai-sidebar--collapsed')) {
            island.classList.add('ai-island--visible');
        } else {
            island.classList.remove('ai-island--visible');
        }
    }

    // ===== ДИАЛОГИ =====

    async function loadConversations() {
        try {
            const conversations = await api.get('/ai/conversations');
            const container = document.getElementById('conversationsList');

            if (!conversations.length) {
                container.innerHTML = '<p style="color: var(--color-text-muted); font-size: 13px; padding: 12px;">Нет диалогов</p>';
                return;
            }

            container.innerHTML = conversations.map(c => `
            <div class="conv-item ${c.id === currentConversationId ? 'conv-item--active' : ''}" 
                 onclick="openConversation(${c.id})">
                <div class="conv-title">${escapeHtml(c.title)}</div>
                <div class="conv-time">${formatDate(c.updated_at)}</div>
                <button class="conv-delete" onclick="event.stopPropagation(); deleteConversation(${c.id})" title="Удалить">×</button>
            </div>
        `).join('');
        } catch (e) {
            console.error('Load conversations error:', e);
        }
    }

    async function openConversation(id) {
        currentConversationId = id;
        document.getElementById('chatEmpty').style.display = 'none';
        document.getElementById('chatActive').style.display = 'flex';

        try {
            const messages = await api.get(`/ai/conversations/${id}/messages`);
            const container = document.getElementById('chatMessages');

            container.innerHTML = messages.map(m => `
            <div class="ai-message ${m.role === 'user' ? 'ai-message--user' : ''}">
                <div class="ai-message-avatar">${m.role === 'user' ? '👤' : '🤖'}</div>
                <div class="ai-message-bubble">${formatMessage(m.content)}</div>
            </div>
        `).join('');

            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.error(e);
        }

        loadConversations();
        document.getElementById('chatInput').focus();
    }

    async function newConversation() {
        currentConversationId = null;
        document.getElementById('chatEmpty').style.display = 'none';
        document.getElementById('chatActive').style.display = 'flex';
        document.getElementById('chatMessages').innerHTML = '';
        document.getElementById('convTitle').textContent = 'Новый диалог';
        document.getElementById('chatInput').focus();
    }

    async function deleteConversation(id) {
        if (!confirm('Удалить диалог?')) return;
        try {
            await api.delete(`/ai/conversations/${id}`);
            if (currentConversationId === id) newConversation();
            loadConversations();
        } catch (e) {
            console.error(e);
        }
    }

    // ===== ОТПРАВКА СООБЩЕНИЙ =====

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;

        const messages = document.getElementById('chatMessages');

        // Сообщение пользователя
        messages.innerHTML += `
        <div class="ai-message ai-message--user">
            <div class="ai-message-avatar">👤</div>
            <div class="ai-message-bubble">${escapeHtml(message)}</div>
        </div>
    `;
        input.value = '';
        input.style.height = 'auto';
        messages.scrollTop = messages.scrollHeight;

        // Индикатор печати
        const typingId = 'typing-' + Date.now();
        messages.innerHTML += `
        <div class="ai-message" id="${typingId}">
            <div class="ai-message-avatar">🤖</div>
            <div class="ai-message-bubble">
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>
    `;
        messages.scrollTop = messages.scrollHeight;

        try {
            const response = await api.post('/ai/chat', {
                message,
                conversationId: currentConversationId
            });

            document.getElementById(typingId)?.remove();

            messages.innerHTML += `
            <div class="ai-message">
                <div class="ai-message-avatar">🤖</div>
                <div class="ai-message-bubble">${formatMessage(response.reply)}</div>
            </div>
        `;
            messages.scrollTop = messages.scrollHeight;

            currentConversationId = response.conversationId;
            document.getElementById('convTitle').textContent = message.substring(0, 40);
            loadConversations();
        } catch (e) {
            document.getElementById(typingId)?.remove();
            messages.innerHTML += `
            <div class="ai-message">
                <div class="ai-message-avatar">🤖</div>
                <div class="ai-message-bubble">Ошибка подключения к AI 😔</div>
            </div>
        `;
        }
    }

    // ===== УТИЛИТЫ =====

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatMessage(text) {
        return escapeHtml(text)
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
    }
    // При загрузке — открываем боковую панель
    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('aiIsland').classList.remove('ai-island--visible');
    });
    // ===== ЗАПУСК =====
    // При загрузке
    loadConversations();
    document.getElementById('aiIsland').classList.remove('ai-island--visible');
</script>

<style>
    /* ===== LAYOUT ===== */
    .ai-layout {
        display: flex;
        gap: 0;
        height: calc(100vh - 250px);
        background: var(--color-surface);
        border-radius: var(--radius-xl);
        border: 1px solid var(--color-border);
        overflow: hidden;
        position: relative;
    }

    /* ===== ОСТРОВОК (свёрнуто) ===== */
    .ai-island {
        position: absolute;
        top: 10px;
        left: 10px;
        display: none;
        gap: 6px;
        z-index: 10;
        background: var(--color-surface);
        border-radius: 12px;
        padding: 6px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--color-border);
    }

    .ai-island--visible {
        display: flex;
    }

    /* Футер боковой панели */
    .ai-sidebar-footer {
        padding: 12px;
        border-top: 1px solid var(--color-border);
    }

    .ai-new-chat-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 12px 16px;
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        cursor: pointer;
        font-family: var(--font-primary);
        font-size: 14px;
        font-weight: 600;
        color: var(--color-text);
        transition: var(--transition-fast);
    }

    .ai-new-chat-btn:hover {
        background: #E9FFD6;
        border-color: var(--color-primary);
    }

    .ai-new-chat-btn span:first-child {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
    }

    .ai-island-btn {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: none;
        background: var(--color-bg);
        color: var(--color-text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        transition: var(--transition-fast);
    }

    .ai-island-btn--primary {
        background: var(--color-primary);
        color: white;
    }

    .ai-sidebar-toggle {
        cursor: pointer;
        font-size: 16px;
        padding: 4px 8px;
        border-radius: 6px;
        background: transparent;
        border: none;
        color: var(--color-text-muted);
        font-weight: 700;
    }

    .ai-sidebar-add {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: none;
        background: var(--color-primary);
        color: white;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .ai-island-btn:hover {
        background: var(--color-surface-hover);
    }

    .ai-island-btn--primary:hover {
        background: var(--color-primary-light);
    }

    /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
    .ai-sidebar {
        width: 30%;
        min-width: 150px;
        max-width: 190px;
        background: var(--color-bg);
        border-right: 1px solid var(--color-border);
        display: flex;
        flex-direction: column;
        transition: width 0.3s, min-width 0.3s, max-width 0.3s, opacity 0.3s;
        overflow: hidden;
        opacity: 1;
    }

    .ai-sidebar--collapsed {
        width: 0;
        min-width: 0;
        max-width: 0;
        opacity: 0;
    }

    .ai-sidebar-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 12px;
        border-bottom: 1px solid var(--color-border);
    }

    .ai-sidebar-header h3 {
        font-size: 15px;
        margin: 0;
        flex: 1;
        font-family: var(--font-heading);
    }


    .ai-sidebar-toggle:hover {
        background: var(--color-border);
        color: var(--color-text);
    }

    .ai-sidebar-add:hover {
        background: var(--color-primary-light);
    }

    .ai-conversations {
        flex: 1;
        overflow-y: auto;
    }

    /* ===== ЭЛЕМЕНТЫ СПИСКА ===== */
    .conv-item {
        padding: 12px 14px;
        cursor: pointer;
        border-bottom: 1px solid var(--color-border-light);
        position: relative;
        transition: var(--transition-fast);
    }

    .conv-item:hover {
        background: var(--color-surface);
    }

    .conv-item--active {
        background: #A4FF55 !important;
    }

    .ai-message-user .ai-message-bubble {
        background: #A4FF55;
    }

    .conv-title {
        font-size: 13px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding-right: 20px;
    }

    .conv-time {
        font-size: 11px;
        color: var(--color-text-muted);
        margin-top: 2px;
    }

    .conv-delete {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--color-text-muted);
        cursor: pointer;
        font-size: 18px;
        opacity: 0;
        transition: var(--transition-fast);
    }

    .conv-item:hover .conv-delete {
        opacity: 1;
    }

    .conv-delete:hover {
        color: var(--color-danger);
    }

    /* ===== ОСНОВНАЯ ОБЛАСТЬ ===== */
    .ai-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .ai-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
        color: var(--color-text-muted);
        text-align: center;
        padding: 20px;
    }

    .ai-empty-icon {
        font-size: 48px;
    }

    /* ===== ЧАТ ===== */
    .chat-active-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--color-border);
        font-weight: 600;
        font-size: 15px;
        font-family: var(--font-heading);
    }

    .ai-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
    }

    .ai-message {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .ai-message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-bg);
        flex-shrink: 0;
        font-size: 16px;
    }

    .ai-message-bubble {
        background: var(--color-bg);
        border-radius: 4px 16px 16px 16px;
        padding: 10px 14px;
        max-width: 75%;
        font-size: 14px;
        line-height: 1.6;
        word-break: break-word;
    }

    .ai-message--user .ai-message-bubble {
        background: #E9FFD6;
        border-radius: 16px 4px 16px 16px;
    }

    /* ===== ПОЛЕ ВВОДА ===== */
    .ai-chat-input-row {
        padding: 12px 16px;
        border-top: 1px solid var(--color-border);
    }

    .ai-chat-input-wrapper {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        background: var(--color-bg);
        border-radius: 24px;
        padding: 8px 8px 8px 16px;
        border: 1.5px solid var(--color-border);
        transition: var(--transition-fast);
    }

    .ai-chat-input-wrapper:focus-within {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px var(--color-primary-bg);
    }

    .ai-chat-input-wrapper textarea {
        flex: 1;
        border: none;
        outline: none;
        resize: none;
        font-family: var(--font-primary);
        font-size: 14px;
        line-height: 1.4;
        max-height: 100px;
        background: transparent;
        padding: 4px 0;
        color: var(--color-text);
    }

    .ai-chat-input-wrapper textarea::placeholder {
        color: var(--color-text-muted);
    }

    .ai-chat-input-wrapper button {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--color-primary);
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: var(--transition-fast);
    }

    .ai-chat-input-wrapper button:hover {
        background: var(--color-primary-light);
    }

    /* ===== ТОЧКИ ПЕЧАТИ ===== */
    .typing-dots {
        display: flex;
        gap: 4px;
        padding: 4px 0;
    }

    .typing-dots span {
        width: 6px;
        height: 6px;
        background: var(--color-text-muted);
        border-radius: 50%;
        animation: bounce 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes bounce {

        0%,
        80%,
        100% {
            transform: scale(0);
        }

        40% {
            transform: scale(1);
        }
    }

    /* ===== АДАПТИВ ===== */
    @media (max-width: 600px) {
        .ai-layout {
            height: calc(100vh - 200px);
        }

        .ai-sidebar {
            width: 30%;
            min-width: 160px;
            max-width: 200px;
        }

        .ai-message-bubble {
            max-width: 85%;
        }
    }
</style>
