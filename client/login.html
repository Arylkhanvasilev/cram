<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cram - Вход</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">📚</div>
            <h1 class="auth-title">Cram</h1>
            <p class="auth-subtitle">Войдите в аккаунт</p>
            
            <form class="auth-form" id="loginForm">
                <input class="input" type="email" id="email" placeholder="Email" required>
                <input class="input" type="password" id="password" placeholder="Пароль" required>
                <div class="auth-error" id="errorMsg"></div>
                <button type="submit" class="btn btn-primary btn-primary-full">Войти</button>
            </form>
            
            <p class="auth-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </p>
            
            <div class="auth-demo">
                <div>👨‍🎓 Ученик: student@eduflow.com</div>
                <div>👨‍🏫 Учитель: teacher@eduflow.com</div>
                <div>👪 Родитель: parent@eduflow.com</div>
                <div>🔑 Пароль: password123</div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const API_URL = CONFIG.API_URL;
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Ошибка входа');
                
                Auth.saveAuth(data.token, data.user);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
