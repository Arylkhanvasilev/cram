<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Cram</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎓 Регистрация</h1>
                <p>Присоединяйтесь к Cram</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Полное имя</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="Иван Иванов">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="ivan@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Минимум 6 символов" minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="role">Роль</label>
                    <select id="role" name="role" class="role-select" required>
                        <option value="student">Ученик</option>
                        <option value="teacher">Учитель</option>
                        <option value="parent">Родитель</option>
                    </select>
                </div>
                
                <div class="form-group" id="gradeGroup" style="display: none;">
                    <label for="grade">Класс</label>
                    <input type="number" id="grade" name="grade" min="1" max="11" 
                           placeholder="9">
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Зарегистрироваться
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
