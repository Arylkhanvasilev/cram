<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cram - Регистрация</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">📚</div>
            <h1 class="auth-title">Cram</h1>
            <p class="auth-subtitle">Создайте аккаунт</p>
            
            <form class="auth-form" id="registerForm">
                <input class="input" type="text" id="name" placeholder="Полное имя" required>
                <input class="input" type="email" id="email" placeholder="Email" required>
                <input class="input" type="password" id="password" placeholder="Пароль (мин. 6 символов)" minlength="6" required>
                <select class="input" id="role" required>
                    <option value="">Выберите роль</option>
                    <option value="student">Ученик</option>
                    <option value="teacher">Учитель</option>
                    <option value="parent">Родитель</option>
                </select>
                <div class="auth-error" id="errorMsg"></div>
                <button type="submit" class="btn btn-primary btn-primary-full">Зарегистрироваться</button>
            </form>
            
            <p class="auth-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const result = await api.post('/auth/register', data);
                Auth.saveAuth(result.token, result.user);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
