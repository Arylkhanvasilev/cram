<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cram - Уведомления</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Unbounded:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .notification-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            margin-bottom: 8px;
            border: 1px solid var(--color-border);
            transition: var(--transition-fast);
            cursor: pointer;
        }

        .notification-item:active {
            background: var(--color-surface-hover);
        }

        .notification-item--unread {
            border-left: 3px solid var(--color-primary);
            background: var(--color-bounded-bg);
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .notification-icon--task {
            background: #E9FFD6;
        }

        .notification-icon--reminder {
            background: #FEBD59;
        }

        .notification-icon--system {
            background: #59AEFE;
        }

        .notification-content {
            flex: 1;
        }

        .notification-text {
            font-size: 14px;
            color: var(--color-text);
            margin-bottom: 4px;
        }

        .notification-time {
            font-size: 11px;
            color: var(--color-text-muted);
        }

        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="app">
        <main class="main-scroll">
            <div class="notifications-header">
                <h2 class="section-title">Уведомления</h2>
                <button class="btn btn-small"
                    style="background: var(--color-primary); color: #FFF; padding: 8px 16px; border-radius: 20px; font-size: 13px;"
                    onclick="markAllRead()">
                    Прочитать все
                </button>
            </div>
            <div id="notificationsList">
                <div class="empty-state">
                    <p>Загрузка...</p>
                </div>
            </div>
        </main>

        <!-- Навбар -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
            </a>
            <a href="tasks.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </a>
            <a href="statistics.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </a>
            <a href="profile.html" class="nav-item nav-item--profile">
                <img class="nav-avatar" id="navAvatar" src="" alt="Профиль"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div id="navAvatarFallback" class="avatar avatar--sm"
                    style="background: var(--color-primary); display: none;">?</div>
            </a>
        </nav>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function loadNotifications() {
            if (!Auth.requireAuth()) return;

            const user = Auth.getUser();
            const firstName = (user.name || '?').split(' ')[0];

            // Аватар в навбаре
            const navFallback = document.getElementById('navAvatarFallback');
            const navAvatar = document.getElementById('navAvatar');
            if (navFallback) {
                navFallback.textContent = firstName.charAt(0).toUpperCase();
                navFallback.style.display = 'flex';
            }
            if (navAvatar) navAvatar.style.display = 'none';

            try {
                const notifications = await api.get('/assignments/notifications');
                const container = document.getElementById('notificationsList');

                if (!notifications.length) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state__icon">🔔</div><p>Нет уведомлений</p></div>';
                    return;
                }

                container.innerHTML = notifications.map(n => `
                    <div class="notification-item ${n.is_read ? '' : 'notification-item--unread'}" onclick="markRead(${n.id})">
                        <div class="notification-icon ${n.type === 'new_assignment' ? 'notification-icon--task' : n.type === 'deadline_reminder' ? 'notification-icon--reminder' : 'notification-icon--system'}">
                            ${n.type === 'new_assignment' ? '📝' : n.type === 'deadline_reminder' ? '⏰' : '🔔'}
                        </div>
                        <div class="notification-content">
                            <div class="notification-text">${n.message}</div>
                            <div class="notification-time">${formatDate(n.created_at)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('notificationsList').innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>';
            }
        }

        async function markRead(id) {
            try {
                await api.patch(`/assignments/notifications/${id}/read`, {});
                loadNotifications();
            } catch (e) { }
        }

        async function markAllRead() {
            const notifications = await api.get('/assignments/notifications');
            for (const n of notifications) {
                if (!n.is_read) {
                    await api.patch(`/assignments/notifications/${n.id}/read`, {}).catch(() => { });
                }
            }
            loadNotifications();
        }

        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>

</html>
