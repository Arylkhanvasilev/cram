<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои классы - Cram</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/classes.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="container">
            <div class="nav-brand">
                <a href="dashboard.html" class="logo">🎓 Cram</a>
            </div>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-link">Дашборд</a>
                <a href="classes.html" class="nav-link active">Классы</a>
                <a href="profile.html" class="nav-link">Профиль</a>
                <span id="userName" class="user-name"></span>
                <button id="logoutBtn" class="btn btn-outline">Выйти</button>
            </div>
        </div>
    </nav>

    <main class="classes-page">
        <div class="container">
            <!-- Заголовок -->
            <div class="page-header">
                <h1>
                    <span id="pageTitle">Мои классы</span>
                </h1>
                <div class="header-actions">
                    <button id="createClassBtn" class="btn btn-primary teacher-only" style="display: none;">
                        + Создать класс
                    </button>
                    <button id="refreshBtn" class="btn btn-outline">🔄 Обновить</button>
                </div>
            </div>

            <!-- Приглашения (для ученика) -->
            <div id="invitationsSection" class="invitations-section student-only" style="display: none;">
                <h2>📨 Приглашения в классы</h2>
                <div id="invitationsList" class="invitations-list">
                    <div class="loading">Загрузка приглашений...</div>
                </div>
            </div>

            <!-- Список классов -->
            <div id="classesContainer" class="classes-container">
                <div class="loading">Загрузка классов...</div>
            </div>
        </div>
    </main>

    <!-- Модальное окно создания класса -->
    <div id="classModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Создать новый класс</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="classForm">
                <div class="form-group">
                    <label for="className">Название класса</label>
                    <input type="text" id="className" required placeholder="Например: 9А - Алгебра">
                </div>
                <div class="form-group">
                    <label for="classSubject">Предмет</label>
                    <input type="text" id="classSubject" required placeholder="Алгебра">
                </div>
                <div class="form-group">
                    <label for="classGrade">Класс (год обучения)</label>
                    <input type="number" id="classGrade" min="1" max="11" placeholder="9">
                </div>
                <div class="form-group">
                    <label for="classDescription">Описание</label>
                    <textarea id="classDescription" rows="3" placeholder="Дополнительная информация о классе"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Создать</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно деталей класса -->
    <div id="classDetailModal" class="modal modal-large" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailModalTitle">Класс</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Вкладки -->
                <div class="detail-tabs">
                    <button class="tab-btn active" data-tab="students">👥 Ученики</button>
                    <button class="tab-btn" data-tab="assignments">📝 Задания</button>
                    <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
                </div>
                
                <!-- Вкладка учеников -->
                <div id="studentsTab" class="tab-content active">
                    <div class="tab-actions teacher-only">
                        <button id="inviteStudentBtn" class="btn btn-primary">+ Пригласить ученика</button>
                        <button id="bulkInviteBtn" class="btn btn-outline">📧 Массовое приглашение</button>
                    </div>
                    <div id="studentsList" class="students-list">
                        <div class="loading">Загрузка учеников...</div>
                    </div>
                </div>
                
                <!-- Вкладка заданий -->
                <div id="assignmentsTab" class="tab-content">
                    <div class="tab-actions teacher-only">
                        <button id="createAssignmentBtn" class="btn btn-primary">+ Создать задание</button>
                    </div>
                    <div id="classAssignmentsList" class="assignments-list">
                        <div class="loading">Загрузка заданий...</div>
                    </div>
                </div>
                
                <!-- Вкладка настроек -->
                <div id="settingsTab" class="tab-content">
                    <form id="classSettingsForm">
                        <div class="form-group">
                            <label for="editClassName">Название класса</label>
                            <input type="text" id="editClassName" required>
                        </div>
                        <div class="form-group">
                            <label for="editClassSubject">Предмет</label>
                            <input type="text" id="editClassSubject" required>
                        </div>
                        <div class="form-group">
                            <label for="editClassGrade">Класс</label>
                            <input type="number" id="editClassGrade" min="1" max="11">
                        </div>
                        <div class="form-group">
                            <label for="editClassDescription">Описание</label>
                            <textarea id="editClassDescription" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </form>
                    
                    <div class="danger-zone">
                        <h4>Опасная зона</h4>
                        <button id="deleteClassBtn" class="btn btn-danger">Удалить класс</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания задания -->
    <div id="assignmentModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Создать задание для класса</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="assignmentForm">
                <div class="form-group">
                    <label for="assignmentTitle">Название</label>
                    <input type="text" id="assignmentTitle" required>
                </div>
                <div class="form-group">
                    <label for="assignmentDescription">Описание</label>
                    <textarea id="assignmentDescription" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="assignmentDeadline">Дедлайн</label>
                        <input type="datetime-local" id="assignmentDeadline" required>
                    </div>
                    <div class="form-group">
                        <label for="notifyBefore">Напомнить за</label>
                        <select id="notifyBefore">
                            <option value="1 hour">1 час</option>
                            <option value="3 hours">3 часа</option>
                            <option value="1 day" selected>1 день</option>
                            <option value="2 days">2 дня</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Создать</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно приглашения -->
    <div id="inviteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Пригласить ученика</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="inviteForm">
                <div class="form-group">
                    <label for="studentEmail">Email ученика</label>
                    <input type="email" id="studentEmail" required placeholder="student@example.com">
                </div>
                <button type="submit" class="btn btn-primary">Отправить приглашение</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно массового приглашения -->
    <div id="bulkInviteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Массовое приглашение</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="bulkInviteForm">
                <div class="form-group">
                    <label for="studentEmails">Email учеников (по одному на строку)</label>
                    <textarea id="studentEmails" rows="5" required placeholder="student1@example.com&#10;student2@example.com&#10;student3@example.com"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Отправить приглашения</button>
            </form>
        </div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <script src="js/app.js"></script>
    <script src="js/classes.js"></script>
</body>
</html>
